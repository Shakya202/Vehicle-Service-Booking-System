{% extends "base.html" %}
{% block title %}Create Booking - Vehicle Service Mart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="section-panel">
            <h1 class="h3 fw-bold mb-3">Create Booking</h1>
            <form method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Service</label>
                    <select name="service_id" id="service_id" class="form-select" required>
                        <option value="">Select service</option>
                        {% for service in services %}
                            {% set current_value = request.form.get('service_id')|int if request.form.get('service_id') else selected_service_id %}
                            <option value="{{ service.id }}"
                                    data-price="{{ service.base_price }}"
                                    data-duration="{{ service.duration_minutes }}"
                                    {% if current_value == service.id %}selected{% endif %}>
                                {{ service.name }} - Rs. {{ "%.2f"|format(service.base_price) }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" name="vehicle_number" class="form-control"
                           placeholder="Example: CAA 1234"
                           value="{{ request.form.get('vehicle_number', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Booking Date</label>
                    <input type="date" name="booking_date" class="form-control"
                           min="{{ today }}"
                           value="{{ request.form.get('booking_date', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Booking Time</label>
                    <input type="time" name="booking_time" class="form-control"
                           min="08:00" max="17:00"
                           value="{{ request.form.get('booking_time', '') }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Optional service note">{{ request.form.get('notes', '') }}</textarea>
                </div>
                <div class="col-12">
                    <div class="price-box d-flex justify-content-between align-items-center">
                        <div>
                            <span class="small text-muted d-block">Calculated Price</span>
                            <strong id="priceText">Select a service</strong>
                        </div>
                        <span id="durationText" class="badge text-bg-light">Duration</span>
                    </div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-check2-circle me-1"></i>Submit Booking
                    </button>
                    <a href="{{ url_for('booking_history') }}" class="btn btn-outline-secondary">History</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const serviceSelect = document.getElementById("service_id");
const priceText = document.getElementById("priceText");
const durationText = document.getElementById("durationText");

function updatePrice() {
    const option = serviceSelect.options[serviceSelect.selectedIndex];
    if (!option || !option.dataset.price) {
        priceText.textContent = "Select a service";
        durationText.textContent = "Duration";
        return;
    }
    priceText.textContent = `Rs. ${Number(option.dataset.price).toFixed(2)}`;
    durationText.textContent = `${option.dataset.duration} min`;
}

serviceSelect.addEventListener("change", updatePrice);
updatePrice();
</script>
{% endblock %}
